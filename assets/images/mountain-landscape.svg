/* SVG Mountain Landscape - Ngaduman Cascara & Coffee Dummy Image */
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%; display: block;">
  <!-- Sky -->
  <rect width="200" height="120" fill="#E8D4C4"/>
  
  <!-- Sun -->
  <circle cx="160" cy="40" r="20" fill="#D8C3A5" opacity="0.8"/>
  
  <!-- Clouds -->
  <ellipse cx="50" cy="30" rx="20" ry="12" fill="#F5F0E8" opacity="0.7"/>
  <ellipse cx="70" cy="35" rx="15" ry="10" fill="#F5F0E8" opacity="0.7"/>
  
  <!-- Back Mountains -->
  <polygon points="20,120 80,60 140,120" fill="#C9B5A0" opacity="0.6"/>
  
  <!-- Front Mountains -->
  <polygon points="0,120 60,50 110,120" fill="#B89B72" opacity="0.8"/>
  <polygon points="90,120 150,55 200,120" fill="#B89B72" opacity="0.75"/>
  
  <!-- Ground/Fields -->
  <rect y="120" width="200" height="80" fill="#A68B6F"/>
  
  <!-- Coffee Plants (stylized) -->
  <circle cx="40" cy="140" r="8" fill="#7CB342"/>
  <circle cx="60" cy="135" r="10" fill="#8BC34A"/>
  <circle cx="90" cy="145" r="9" fill="#7CB342"/>
  <circle cx="130" cy="138" r="11" fill="#8BC34A"/>
  <circle cx="160" cy="142" r="8" fill="#7CB342"/>
  
  <!-- Trees on slopes -->
  <polygon points="30,110 25,95 35,95" fill="#558B2F"/>
  <polygon points="140,90 135,75 145,75" fill="#558B2F"/>
  
  <!-- Text -->
  <text x="100" y="190" font-family="Arial" font-size="12" font-weight="bold" 
        text-anchor="middle" fill="white">Coffee Plantation</text>
</svg>
