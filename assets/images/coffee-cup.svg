/* SVG Coffee Cup - Ngaduman Cascara & Coffee Dummy Image */
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%; display: block;">
  <!-- Background -->
  <rect width="200" height="200" fill="#F8F8F8"/>
  
  <!-- Cup Body -->
  <path d="M 50 60 L 50 140 Q 50 150 60 150 L 140 150 Q 150 150 150 140 L 150 60 Z" 
        fill="#D8C3A5" stroke="#B89B72" stroke-width="2"/>
  
  <!-- Cup Rim -->
  <ellipse cx="100" cy="60" rx="50" ry="15" fill="#B89B72" stroke="#B89B72" stroke-width="1"/>
  
  <!-- Handle -->
  <path d="M 150 80 Q 170 80 170 110 Q 170 140 150 140" 
        fill="none" stroke="#B89B72" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Coffee Inside -->
  <ellipse cx="100" cy="120" rx="45" ry="12" fill="#8B6F47" opacity="0.7"/>
  <path d="M 55 70 L 55 125 Q 55 145 60 150 L 140 150 Q 145 145 145 125 L 145 70 Z" 
        fill="#8B6F47" opacity="0.6"/>
  
  <!-- Highlight -->
  <ellipse cx="75" cy="90" rx="15" ry="20" fill="#fff" opacity="0.3"/>
  
  <!-- Text -->
  <text x="100" y="175" font-family="Arial" font-size="14" font-weight="bold" 
      text-anchor="middle" fill="#B89B72">Ngaduman Cascara</text>
</svg>
